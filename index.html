<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallora</title>

    <style>

        body{
            margin:0;
            background:#000;
            color:white;
            font-family:Arial, Helvetica, sans-serif;
        }

        .container{
            max-width:900px;
            margin:auto;
            padding:70px 30px;
            text-align:center;
        }

        .logo{
        width:110px;
         max-width:28vw;
    height:auto;
    display:block;
    margin:0 auto 18px auto;
}


        h1{
            font-size:54px;
            margin-bottom:8px;
        }

        .subtitle{
            color:#BBBBBB;
            font-size:22px;
            margin-bottom:50px;
        }

        .card{
            background:#141414;
            border-radius:24px;
            padding:35px;
            margin-top:35px;
        }

        .button{
            display:inline-block;
            margin:10px;
            padding:16px 30px;
            border-radius:16px;
            text-decoration:none;
            font-weight:bold;
            transition:.2s;
        }

        .play{
            background:#FFD54F;
            color:black;
        }

        .privacy{
            background:#262626;
            color:white;
        }

        .button:hover{
            transform:scale(1.04);
        }

        .footer{
            margin-top:60px;
            color:#777;
            font-size:14px;
        }

        .email{
            color:#FFD54F;
            text-decoration:none;
        }

    </style>

</head>

<body>

<div class="container">

    <img
            src="assets/wallora-logo.png"
            alt="Wallora Logo"
            class="logo"
    >

    <h1>Wallora</h1>

    <div class="subtitle">
        AI • 4K • AMOLED Wallpapers
    </div>

    <div class="card">

        <h2>Premium AI Wallpapers</h2>

        <p>
            Discover beautiful AI-generated wallpapers designed for AMOLED displays and 4K screens.
        </p>

        <br>

        <a class="button play" href="#">
            Google Play (Coming Soon)
        </a>

        <a class="button privacy" href="privacy-policy.md">
            Privacy Policy
        </a>

    </div>

    <div class="card">

        <h2>Contact</h2>

        <p>

            <a class="email"
               href="mailto:wallora.support@gmail.com">

                wallora.support@gmail.com

            </a>

        </p>

    </div>

    <div class="footer">

        © 2026 Wallora. All rights reserved.

    </div>

</div>

</body>

</html>
